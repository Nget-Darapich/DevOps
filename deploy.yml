---
- name: Deploy ID Card Application to Docker Container
  hosts: localhost
  connection: local
  vars:
    project_root: /mnt/d/I4/CTP_Software_Engineering/demo/demo
    jar_name: demo-0.0.1-SNAPSHOT.jar
    container_name: id-card-web

  tasks:
    - name: Copy new JAR into container
      shell: docker cp {{ project_root }}/target/{{ jar_name }} {{ container_name }}:/app/{{ jar_name }}

    - name: Restart Spring Boot service
      shell: docker exec {{ container_name }} supervisorctl restart spring-boot

    - name: Wait for app to become healthy
      uri:
        url: http://localhost:8080/profiles
        status_code: 200
      register: result
      until: result.status == 200
      retries: 12
      delay: 5