spring.application.name=id-card-manager-test

# Use H2 in-memory database for testing
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (disabled by default in tests)
spring.h2.console.enabled=false

# Hibernate Configuration for Testing - recreate database for each test
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# File Upload Configuration (Test)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads/photos/

# Logging
logging.level.org.springframework.boot.test=WARN
logging.level.org.springframework.test=WARN
logging.level.com.example.idcardmanager=INFO
