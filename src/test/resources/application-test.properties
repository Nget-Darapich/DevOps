spring.application.name=id-card-manager-test-profile

# Use H2 in-memory database for testing with MySQL mode
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (disabled for test profile)
spring.h2.console.enabled=false

# Hibernate Configuration for Testing
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads/photos/

# Disable unnecessary logging during tests
logging.level.org.springframework.boot.test=WARN
logging.level.org.springframework.test=WARN
logging.level.org.springframework.web=WARN
