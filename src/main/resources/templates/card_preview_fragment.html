<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }

        .card-preview {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 600px;
            margin: 0 auto;
        }

        .card-content {
            padding: 40px;
            position: relative;
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }

        /* Dynamic styling from template */
        .card-header {
            padding: 20px;
            margin: -40px -40px 20px -40px;
            border-bottom: 3px solid;
        }

        .card-header.vertical {
            background: linear-gradient(135deg, var(--primary-color) 0%, rgba(0,0,0,0.1) 100%);
            border-bottom-color: var(--primary-color);
            text-align: center;
        }

        .organization-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: white;
            margin-bottom: 5px;
        }

        .tagline {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.9);
            font-style: italic;
        }

        .card-body {
            flex-grow: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .photo-section {
            grid-column: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .photo-frame {
            width: 120px;
            height: 140px;
            background: var(--secondary-color);
            border: 2px solid var(--primary-color);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-placeholder {
            color: var(--primary-color);
            font-size: 2rem;
            opacity: 0.3;
        }

        .info-section {
            grid-column: 2;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .info-field {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .info-value {
            font-size: 0.95rem;
            color: var(--text-color);
            font-weight: 500;
        }

        .card-footer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            border-top: 1px solid var(--secondary-color);
            padding-top: 15px;
            margin-top: auto;
        }

        .barcode-section,
        .qrcode-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .barcode-label,
        .qrcode-label {
            font-size: 0.7rem;
            color: #999;
            text-transform: uppercase;
        }

        .barcode-image,
        .qrcode-image {
            max-width: 100%;
            height: auto;
        }

        .barcode-image {
            max-height: 50px;
        }

        .qrcode-image {
            max-height: 80px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            justify-content: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-secondary {
            background: var(--secondary-color);
            color: var(--text-color);
            border: 2px solid var(--primary-color);
        }

        .btn-secondary:hover {
            background: var(--primary-color);
            color: white;
        }

        @media (max-width: 600px) {
            .card-body {
                grid-template-columns: 1fr;
            }

            .photo-section {
                grid-column: 1;
            }

            .info-section {
                grid-column: 1;
            }

            .card-footer {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ID Card Preview</h1>

        <div class="card-preview">
            <div class="card-content"
                 th:style="'--primary-color: ' + (${profile.template?.primaryColor} ?: '#1d4ed8') + '; --secondary-color: ' + (${profile.template?.secondaryColor} ?: '#e0e7ff') + '; --text-color: ' + (${profile.template?.textColor} ?: '#111827')">

                <!-- Card Header -->
                <div class="card-header vertical">
                    <div class="organization-name" th:text="${profile.template?.organizationName} ?: 'Organization'"></div>
                    <div class="tagline" th:if="${profile.template?.tagline}" th:text="${profile.template.tagline}"></div>
                </div>

                <!-- Card Body -->
                <div class="card-body">
                    <!-- Photo Section -->
                    <div class="photo-section">
                        <div class="photo-frame">
                            <img th:if="${profile.hasPhoto()}" th:src="@{/photos/{file}(file=${profile.photoFileName})}" alt="Profile Photo">
                            <div th:if="!${profile.hasPhoto()}" class="photo-placeholder">📷</div>
                        </div>
                    </div>

                    <!-- Info Section -->
                    <div class="info-section">
                        <div class="info-field">
                            <span class="info-label">Full Name</span>
                            <span class="info-value" th:text="${profile.fullName} ?: 'N/A'"></span>
                        </div>

                        <div class="info-field" th:if="${profile.type}">
                            <span class="info-label">Type</span>
                            <span class="info-value" th:text="${profile.type}"></span>
                        </div>

                        <div class="info-field" th:if="${profile.department}">
                            <span class="info-label">Department</span>
                            <span class="info-value" th:text="${profile.department}"></span>
                        </div>

                        <div class="info-field" th:if="${profile.title}">
                            <span class="info-label">Title</span>
                            <span class="info-value" th:text="${profile.title}"></span>
                        </div>

                        <div class="info-field" th:if="${profile.email}">
                            <span class="info-label">Email</span>
                            <span class="info-value" th:text="${profile.email}"></span>
                        </div>
                    </div>
                </div>

                <!-- Card Footer with Barcodes -->
                <div class="card-footer">
                    <div class="barcode-section" th:if="${barcodeBase64}">
                        <span class="barcode-label">Registration ID</span>
                        <img class="barcode-image" th:src="'data:image/png;base64,' + ${barcodeBase64}" alt="Barcode">
                    </div>

                    <div class="qrcode-section" th:if="${qrCodeBase64}">
                        <span class="qrcode-label">QR Code</span>
                        <img class="qrcode-image" th:src="'data:image/png;base64,' + ${qrCodeBase64}" alt="QR Code">
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="btn btn-primary" onclick="window.print()">Print Card</button>
            <button class="btn btn-secondary" onclick="window.history.back()">Back to Edit</button>
        </div>
    </div>
</body>
</html>
