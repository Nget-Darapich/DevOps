<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card Profiles - List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            color: white;
        }

        h1 {
            font-size: 2rem;
        }

        .btn-create {
            background: white;
            color: #667eea;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-create:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .search-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 1rem;
        }

        .search-box button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .profiles-table {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f3f4f6;
            border-bottom: 2px solid #e5e7eb;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #374151;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e5e7eb;
            color: #374151;
        }

        tbody tr:hover {
            background: #f9fafb;
        }

        .profile-name {
            font-weight: 600;
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
        }

        .profile-name:hover {
            text-decoration: underline;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-student {
            background: #dbeafe;
            color: #1e40af;
        }

        .badge-employee {
            background: #dcfce7;
            color: #166534;
        }

        .badge-user {
            background: #fce7f3;
            color: #9d174d;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-view,
        .btn-delete {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn-view {
            background: #dbeafe;
            color: #1e40af;
        }

        .btn-view:hover {
            background: #bfdbfe;
        }

        .btn-delete {
            background: #fee2e2;
            color: #991b1b;
        }

        .btn-delete:hover {
            background: #fecaca;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .empty-state h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .empty-state a {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .empty-state a:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .message {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .message.success {
            background: #dcfce7;
            color: #166534;
            border-left: 4px solid #16a34a;
        }

        @media (max-width: 800px) {
            table {
                font-size: 0.9rem;
            }

            th, td {
                padding: 10px;
            }

            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>ID Card Profiles</h1>
            <a href="/profiles" class="btn-create">+ Create New Profile</a>
        </header>

        <div th:if="${message}" class="message success" th:text="${message}"></div>

        <div class="search-box">
            <form method="get" action="/profiles/search" style="display: flex; gap: 10px; width: 100%;">
                <input type="text" name="name" placeholder="Search by name..." th:value="${searchTerm}">
                <button type="submit">Search</button>
            </form>
        </div>

        <div th:if="${profiles != null and profiles.size() > 0}" class="profiles-table">
            <table>
                <thead>
                    <tr>
                        <th>Full Name</th>
                        <th>Type</th>
                        <th>Department</th>
                        <th>Email</th>
                        <th>Registration #</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="profile : ${profiles}">
                        <td>
                            <a class="profile-name" th:href="@{/profiles/{uuid}(uuid=${profile.uuid})}" th:text="${profile.fullName}"></a>
                        </td>
                        <td>
                            <span th:class="'badge badge-' + ${profile.type.toString().toLowerCase()}" 
                                  th:text="${profile.type}"></span>
                        </td>
                        <td th:text="${profile.department ?: '-'}"></td>
                        <td th:text="${profile.email ?: '-'}"></td>
                        <td th:text="${profile.registrationNumber}"></td>
                        <td>
                            <div class="action-buttons">
                                <a class="btn-view" th:href="@{/profiles/{uuid}(uuid=${profile.uuid})}">View</a>
                                <form method="post" th:action="@{/profiles/{uuid}/delete(uuid=${profile.uuid})}" 
                                      onsubmit="return confirm('Are you sure?');" style="display: inline;">
                                    <button type="submit" class="btn-delete">Delete</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${profiles == null or profiles.size() == 0}" class="empty-state">
            <div class="empty-state-icon">📋</div>
            <h2>No Profiles Found</h2>
            <p th:if="${searchTerm}">No profiles match "<span th:text="${searchTerm}"></span>"</p>
            <p th:unless="${searchTerm}">Start by creating your first ID card profile</p>
            <a href="/profiles">Create Profile</a>
        </div>
    </div>
</body>
</html>
