<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create ID Card Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .form-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .form-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e5e7eb;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        select,
        textarea {
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        input[type="date"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .file-input-wrapper {
            position: relative;
        }

        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 30px;
            border: 2px dashed #d1d5db;
            border-radius: 6px;
            background: #f9fafb;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-input-label:hover {
            border-color: #667eea;
            background: #f3f4f6;
        }

        .file-input-label.has-file {
            background: #eff6ff;
            border-color: #3b82f6;
        }

        .file-input-icon {
            font-size: 2rem;
            margin-right: 10px;
        }

        .file-input-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .file-input-text strong {
            color: #1f2937;
        }

        .file-input-text span {
            font-size: 0.85rem;
            color: #6b7280;
        }

        input[type="file"] {
            display: none;
        }

        .photo-preview {
            margin-top: 15px;
            display: none;
        }

        .photo-preview.show {
            display: block;
        }

        .photo-preview img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 6px;
            border: 2px solid #e5e7eb;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 40px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-preview {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-preview:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-reset {
            background: #e5e7eb;
            color: #374151;
        }

        .btn-reset:hover {
            background: #d1d5db;
        }

        .info-box {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #92400e;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Create ID Card Profile</h1>
            <p class="subtitle">Fill in the profile details to generate your digital ID card</p>
        </header>

        <div class="form-card">
            <div class="info-box">
                ℹ️ Fields marked with <strong>*</strong> are required. Registration number will be auto-generated if left blank.
            </div>

            <form method="post" action="/profiles/preview" enctype="multipart/form-data" id="profileForm">
                <!-- Personal Information Section -->
                <div class="form-section">
                    <h2 class="section-title">Personal Information</h2>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="fullName">Full Name *</label>
                            <input type="text" id="fullName" name="fullName" required placeholder="Enter full name">
                        </div>
                        <div class="form-group">
                            <label for="type">Profile Type *</label>
                            <select id="type" name="type" required>
                                <option value="">Select Type</option>
                                <option value="STUDENT">Student</option>
                                <option value="EMPLOYEE">Employee</option>
                                <option value="USER">User</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" placeholder="example@organization.com">
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" name="phone" placeholder="+1 (555) 123-4567">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="dateOfBirth">Date of Birth</label>
                            <input type="date" id="dateOfBirth" name="dateOfBirth">
                        </div>
                        <div class="form-group">
                            <label for="bloodGroup">Blood Group</label>
                            <select id="bloodGroup" name="bloodGroup">
                                <option value="">Select Blood Group</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Professional Information Section -->
                <div class="form-section">
                    <h2 class="section-title">Professional Information</h2>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="department">Department</label>
                            <input type="text" id="department" name="department" placeholder="e.g., Engineering, HR, Sales">
                        </div>
                        <div class="form-group">
                            <label for="title">Title / Position</label>
                            <input type="text" id="title" name="title" placeholder="e.g., Software Engineer, Manager">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="registrationNumber">Registration Number</label>
                            <input type="text" id="registrationNumber" name="registrationNumber" placeholder="Auto-generated (leave blank)">
                        </div>
                    </div>
                </div>

                <!-- Card Settings Section -->
                <div class="form-section">
                    <h2 class="section-title">Card Settings</h2>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="template">Template / Theme *</label>
                            <select id="template" name="template.id" required>
                                <option value="">Select a template</option>
                                <option value="1">Professional Blue</option>
                                <option value="2">Corporate Red</option>
                                <option value="3">Modern Green</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="barcodeType">Barcode Type</label>
                            <select id="barcodeType" name="barcodeType">
                                <option value="CODE_128">CODE_128</option>
                                <option value="EAN_13">EAN_13</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Photo Upload Section -->
                <div class="form-section">
                    <h2 class="section-title">Profile Photo</h2>

                    <div class="file-input-wrapper">
                        <label for="photo" class="file-input-label" id="photoLabel">
                            <span class="file-input-icon">📸</span>
                            <div class="file-input-text">
                                <strong>Click to upload or drag and drop</strong>
                                <span>PNG or JPG (max 5MB)</span>
                            </div>
                        </label>
                        <input type="file" id="photo" name="photo" accept="image/png,image/jpeg" onchange="handlePhotoUpload(event)">
                        <div class="photo-preview" id="photoPreview"></div>
                    </div>
                </div>

                <!-- Submit Buttons -->
                <div class="button-group">
                    <button type="submit" class="btn-preview">Generate Preview</button>
                    <button type="reset" class="btn-reset">Clear Form</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const photoInput = document.getElementById('photo');
        const photoLabel = document.getElementById('photoLabel');
        const photoPreview = document.getElementById('photoPreview');

        // Handle drag and drop
        photoLabel.addEventListener('dragover', (e) => {
            e.preventDefault();
            photoLabel.style.borderColor = '#667eea';
            photoLabel.style.background = '#f0f4ff';
        });

        photoLabel.addEventListener('dragleave', () => {
            photoLabel.style.borderColor = '#d1d5db';
            photoLabel.style.background = '#f9fafb';
        });

        photoLabel.addEventListener('drop', (e) => {
            e.preventDefault();
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                photoInput.files = files;
                handlePhotoUpload({ target: { files } });
            }
        });

        function handlePhotoUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    photoPreview.innerHTML = `<img src="${e.target.result}" alt="Photo Preview">`;
                    photoPreview.classList.add('show');
                    photoLabel.classList.add('has-file');
                };
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>
</html>
