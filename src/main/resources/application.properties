spring.application.name=id-card-manager

# MySQL DB Settings - Can be overridden by environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/id_card_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:your_password}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# Hibernate Configuration (Production)
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.properties.hibernate.dialect is auto-detected

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Custom Application Properties
app.upload.dir=uploads/photos/

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Logging
logging.level.com.example.idcardmanager=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.boot.autoconfigure=WARN