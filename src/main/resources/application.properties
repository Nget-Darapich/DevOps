spring.application.name=id-card-manager

# MySQL DB Settings
spring.datasource.url=jdbc:mysql://localhost:3306/id_card_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# File Upload Rules & Target App Directory
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Custom property for your local photo upload path
app.upload.dir=uploads/photos/