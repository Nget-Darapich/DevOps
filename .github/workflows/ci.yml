name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: self-hosted
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: ./mvnw.cmd clean package -DskipTests -Dmaven.compiler.release=21

      - name: Test with Maven
        run: ./mvnw.cmd test -Dmaven.compiler.release=21

      - name: Deploy to Web Server
        if: success()
        run: wsl ansible-playbook -i hosts.ini deploy.yml

      - name: Send email on failure
        if: failure()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "BUILD FAILED: ${{ github.repository }} - Run #${{ github.run_number }}"
          to: ${{ secrets.SMTP_TO }} , ${{ github.event.head_commit.author.email }}
          from: GitHub Actions
          body: |
            **Build Failed**
            Repository: ${{ github.repository }}
            Run: ${{ github.run_number }}
            Commit: ${{ github.sha }}
            Author: ${{ github.event.head_commit.author.name }} <${{ github.event.head_commit.author.email }}>
            URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}